<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — FoodieFind</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="split-layout">

    <!-- Left Panel -->
    <div class="left-panel">
      <div class="brand">
        <div class="brand-logo">🍽️</div>
        <h1>FoodieFind</h1>
        <p>Discover meals you'll love, every single day.</p>
      </div>
      <div class="floating-cards">
        <div class="float-card" style="--d:0s">🍕 Margherita Pizza</div>
        <div class="float-card" style="--d:0.4s">🍜 Ramen Bowl</div>
        <div class="float-card" style="--d:0.8s">🌮 Tacos al Pastor</div>
        <div class="float-card" style="--d:1.2s">🍣 Sushi Platter</div>
        <div class="float-card" style="--d:1.6s">🍛 Butter Chicken</div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="form-box">

        <div class="form-header">
          <h2>Welcome back</h2>
          <p>Sign in to your account</p>
        </div>

        <form action="#" method="post">

          <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
              <span class="icon">✉️</span>
              <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="icon">🔒</span>
              <input type="password" id="password" name="password" placeholder="Enter your password" required />
            </div>
          </div>

          <div class="row-between">
            <label class="checkbox-label">
              <input type="checkbox" name="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-primary">Sign In</button>

          <div class="divider"><span>or continue with</span></div>

          <div class="social-row">
            <button type="button" class="btn-social">
              <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="20" />
              Google
            </button>
            <button type="button" class="btn-social">
            <img src="https://commons.wikimedia.org/wiki/Category:Facebook_f_logos#/media/File:036-facebook.png" alt="Facebook" width="20" />
            Facebook
            </button>
          </div>

        </form>

        <p class="switch-text">
          Don't have an account? <a href="signup.html" class="link bold">Sign Up</a>
        </p>

      </div>
    </div>

  </div>

</body>
</html>
